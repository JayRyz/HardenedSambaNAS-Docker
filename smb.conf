#setting up the global, as the name says those options affect the whole server and 
#every share if the options in the share isnt explicitly set different
[global]
#first we set the role of the server in server role, there are different options available,
#standalone server = classic fileserver, no domain, no AD, auth against local passdb, ntlm
#member server = means is a part of a domain, uses extern AD-DC (auth kerberos/ldap)
#active directory domain controller = as the name says the samba server will be used
#as a full AD DC, LDAP + Kerberos + DNS, permissions groups etc
server role = standalone server
#This is only relevant if using standalone server, technically its just the logic 
#name for the broadcast discovery
workgroup = SAMBAGROUP
#here in security we configure how our server is handling auth,
#user = every user needs to identify themseleves uniquely means client sends username
#samba starts ntlmv2 handshake, hash gets compared to passdb, success gets securitytoken
#domain = auth against NT-Domain (deprecated)
#ads =auth against AD
#share = old sharebased auth (deprecated)
security = user
#as the name says if the shares are read only or not, if you set it here it will be default
#for all shares, but can be overwritten in the shares themselves again
read only = yes
#as the name says if you can get access via guest, also setting it default for shares
guest ok = no
#here we set the minimal accepted smb version
server min protocol = SMB3_11
#with the ntlm auth option we can set : 
#yes = NTLMv1 is allowed to authenticate with
#no = NTLMv1 not allowed
#disabled = all NTLM auth is disabled and not accepted (dont use with standalone)
ntlm auth = no
#the option restrict anonymous can define if not auth users can see shares and how
#they can interact with them
#no = this allows them to see shares and access them freely
#yes = this prevents them to access the shares, but they still see them
#we can also set levels
#1 = allows them to see and acces but hides some defined share names, if you set guest ok yes 
#in some shares then those will be visible to them, if set on guest ok no then those will
#be invisible
#2 = with this setting everything is denied to them and they wont see any if not configered
restrict anonymous = 2
#the option map to guest defines how users who fail to auth are treated.
#never = users who fail to auth will not be granted guest access
#bad user = users who provide a invalid username will be treated as guests
#bad password = users who provide invalid password will be treated as guest users
map to guest = never
#this option server signing configures if the server uses signing or not
#what is signing?: To explain this we go deeper into how the connection between the 
#client and the server is established. 
#First Phase, Negotiation: 
#The Handshake, if a client establishes a connection with a sambaserver they first
#"negotiate" for example which samba version to use and other things like which features,
#the server then says for example "i want/need signing" or "i dont want signing" depending
#on which option we use.
#Second Phase, generating Keys:
#If we then used a option that says want/need signing, both sides create a sessionkey,
#this session key is created with the loginpassword or the NTLM/Kerberosauthtoken.
#Third Phase, signing per package:
#The sender is calculating a hash out of the packagecontents + sessionkey + sequenznumber
#(to track the order of the packages), this signature is attached to the package
#Fourth Phase, the review:
#The reciever is calculating the same hash with his sessionkey and reviews if its alright.
#If its right then the package is accepted, if not then the package is dropped.
server signing = mandatory
#the option smb encrypt encrypts the whole smb traffic
smb encrypt = mandatory
#if only port 445 is used (better, cleaner)
disable netbios = yes
#also important is to have logfiles, the %m here is for clientname, the level defines verbose
#how much information it logs and so on
log file = /var/log/samba/log.%m
log level = 2
#for acls
#is used for real windows compability, windows acl is saved in a special xattr field, not just 
#as posix acl
vfs objects = acl_xattr
inherit acls = yes
map acl inherit = yes
nt acl support = yes

#Lets start to create our first share
#In that case CASH is our sharename here
[CASH]
#first set the path
path = /share/samba/cash
#overwriting our global option
read only = no
#this option browseable defines if the share is visible, if set to 
#yes = share is visible if a client established a connection
#no = its hidden, but clients can still connect if they know the exact path
browseable = yes
#specify which users are valid, @ = all users of specified group
valid users = @tick, jayryz
#this specifys the maximal permissions for new created files
create mask = 0664
#this specifys the maximal permissions for new created folders
directory mask = 0775

